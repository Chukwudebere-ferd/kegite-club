<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kegite Club Sketch UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kegGreen: '#0f6b3f',
            kegLight: '#d9f2e3'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-kegGreen min-h-screen">
  <main class="max-w-6xl mx-auto p-4 md:p-8">
    <div class="border-2 border-kegGreen rounded-2xl p-4 md:p-6">
      <header class="border-2 border-dashed border-kegGreen rounded-xl p-4 mb-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
          <div class="h-8 w-44 border-2 border-kegGreen rounded-lg bg-kegLight/40"></div>
          <nav class="grid grid-cols-3 md:flex gap-2 md:gap-3">
            <div class="h-8 w-24 border-2 border-kegGreen rounded-md"></div>
            <div class="h-8 w-24 border-2 border-kegGreen rounded-md"></div>
            <div class="h-8 w-24 border-2 border-kegGreen rounded-md"></div>
          </nav>
        </div>
      </header>

      <section class="border-2 border-dashed border-kegGreen rounded-xl p-4 md:p-6 mb-4">
        <div class="grid md:grid-cols-2 gap-4 md:gap-6">
          <div class="space-y-3">
            <div class="h-10 w-11/12 border-2 border-kegGreen rounded-md"></div>
            <div class="h-6 w-4/5 border-2 border-kegGreen rounded-md"></div>
            <div class="h-6 w-3/5 border-2 border-kegGreen rounded-md"></div>
            <div class="h-10 w-36 border-2 border-kegGreen rounded-lg bg-kegLight/40"></div>
          </div>
          <div class="h-56 md:h-64 border-2 border-kegGreen rounded-xl bg-kegLight/30"></div>
        </div>
      </section>

      <section class="border-2 border-dashed border-kegGreen rounded-xl p-4 md:p-6 mb-4">
        <div class="h-8 w-44 border-2 border-kegGreen rounded-md mb-4"></div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div class="h-36 border-2 border-kegGreen rounded-lg"></div>
          <div class="h-36 border-2 border-kegGreen rounded-lg"></div>
          <div class="h-36 border-2 border-kegGreen rounded-lg"></div>
        </div>
      </section>

      <section class="border-2 border-dashed border-kegGreen rounded-xl p-4 md:p-6 mb-4">
        <div class="h-8 w-52 border-2 border-kegGreen rounded-md mb-4"></div>
        <div class="space-y-3">
          <div class="h-12 border-2 border-kegGreen rounded-md"></div>
          <div class="h-12 border-2 border-kegGreen rounded-md"></div>
          <div class="h-24 border-2 border-kegGreen rounded-md"></div>
          <div class="h-10 w-40 border-2 border-kegGreen rounded-lg bg-kegLight/40"></div>
        </div>
      </section>

      <footer class="border-2 border-dashed border-kegGreen rounded-xl p-4">
        <div class="h-6 w-56 border-2 border-kegGreen rounded-md"></div>
      </footer>
    </div>
  </main>
</body>
</html>
